<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MiniComp — Compiler</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --panel: #161a22;
    --border: #1f2633; --accent: #00e5ff; --accent3: #a3ff4f;
    --muted: #3d4a5c; --text: #c8d6e8; --text-dim: #5a6a80; --err: #ff5555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); font-family: 'JetBrains Mono', monospace;
    color: var(--text); height: 100vh; display: flex;
    flex-direction: column; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    background: rgba(10,12,16,0.95); backdrop-filter: blur(12px); flex-shrink: 0;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;
  }
  .logo span { color: var(--accent); }
  .logo small {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
    border: 1px solid var(--border); padding: 2px 7px; border-radius: 3px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent3); box-shadow: 0 0 8px var(--accent3);
    display: inline-block; animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .workspace { position: relative; z-index: 1; flex: 1; display: flex; overflow: hidden; }

  .editor-pane {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); overflow: hidden;
  }
  .pane-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--text-dim); flex-shrink: 0;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-red { background: #ff5555; } .dot-yellow { background: #f1fa8c; } .dot-green { background: #50fa7b; }
  .editor-body { flex: 1; display: flex; overflow: hidden; }
  .line-numbers {
    padding: 14px 12px 14px 0; min-width: 46px; text-align: right;
    font-size: 12px; line-height: 1.75; color: var(--muted);
    background: var(--panel); border-right: 1px solid var(--border);
    user-select: none; overflow: hidden; flex-shrink: 0;
  }
  #code-input {
    flex: 1; resize: none; background: transparent; border: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.75; padding: 14px 18px;
    outline: none; tab-size: 2; caret-color: var(--accent); overflow-y: auto;
  }
  #code-input::selection { background: rgba(0,229,255,0.15); }
  #code-input::placeholder { color: var(--muted); }

  .output-pane {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }

  .output-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .output-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); display: flex; align-items: center; gap: 8px;
  }
  .btn-run {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 6px 16px; border-radius: 4px; border: none; cursor: pointer;
    background: var(--accent); color: #000; letter-spacing: 0.5px;
    text-transform: uppercase; box-shadow: 0 0 14px rgba(0,229,255,0.3);
    transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  }
  .btn-run:hover { background: #33eaff; box-shadow: 0 0 22px rgba(0,229,255,0.5); }
  .btn-run:active { transform: scale(0.97); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner {
    width: 11px; height: 11px; border: 2px solid #000;
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.6s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .output-body { 
    flex: 1; overflow-y: auto; padding: 20px; display: flex; 
    flex-direction: column; gap: 20px;
  }
  
  .idle-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--muted); font-size: 12px; text-align: center;
  }
  .idle-state .icon { font-size: 32px; opacity: 0.2; margin-bottom: 4px; }

  /* Section styling */
  .output-section {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
  }

  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: var(--accent); margin-bottom: 10px;
  }

  .section-divider {
    height: 1px; background: var(--border); margin: 10px 0;
  }

  /* Summary section - removed */

  /* Tokenization section */
  .token-line {
    margin-bottom: 8px; padding: 8px; background: var(--panel);
    border-radius: 4px; border-left: 2px solid var(--accent);
    font-size: 11px;
  }
  .token-line-raw {
    color: var(--text-dim); margin-bottom: 4px;
    font-style: italic;
  }
  .token-list {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .token {
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3);
    padding: 2px 6px; border-radius: 3px; font-size: 9px;
    color: var(--accent); font-weight: 500;
  }

  /* Symbol table section */
  .symbol-table {
    width: 100%; border-collapse: collapse; 
    background: var(--panel); border-radius: 4px; 
    border: 1px solid var(--border); overflow: hidden;
    font-size: 11px;
  }
  .symbol-table thead {
    background: rgba(0, 229, 255, 0.08);
    border-bottom: 2px solid var(--border);
  }
  .symbol-table th {
    padding: 10px 12px; text-align: left;
    font-weight: 700; color: var(--accent);
    text-transform: uppercase; font-size: 9px;
    letter-spacing: 1px;
  }
  .symbol-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .symbol-table tbody tr:hover {
    background: rgba(0, 229, 255, 0.04);
  }
  .sym-name {
    font-weight: 700; color: var(--accent3);
  }
  .sym-type {
    color: var(--accent); font-weight: 500;
  }
  .sym-value {
    color: var(--text); font-family: 'JetBrains Mono', monospace;
  }
  .sym-occur {
    color: var(--text-dim); text-align: center;
  }
  .symbol-empty {
    color: var(--text-dim); font-style: italic; font-size: 12px;
    text-align: center; padding: 20px;
  }

  /* Output lines */
  .out-line {
    font-size: 12px; line-height: 1.6; color: var(--accent3); 
    margin-bottom: 4px;
  }
  .out-error {
    color: var(--err); padding: 8px 12px;
    background: rgba(255,85,85,0.07); border: 1px solid rgba(255,85,85,0.2);
    border-radius: 5px; font-size: 11px; line-height: 1.6;
    margin-bottom: 4px;
  }
  .out-empty { 
    color: var(--text-dim); font-size: 11px; font-style: italic; 
  }

  #status-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 3px;
    letter-spacing: 1px; text-transform: uppercase; display: none;
  }
  .badge-ok  { background: rgba(163,255,79,0.1);  color: var(--accent3); border: 1px solid rgba(163,255,79,0.25); }
  .badge-err { background: rgba(255,85,85,0.1);   color: var(--err);     border: 1px solid rgba(255,85,85,0.25); }

  .statusbar {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 20px;
    padding: 5px 20px; background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-dim); flex-shrink: 0;
  }
  #sb-msg { margin-left: auto; }
  .sb-ok  { color: var(--accent3); }
  .sb-err { color: var(--err); }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">Mini<span>Comp</span><small>Compiler</small></div>
  <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim);">
    <span class="status-dot"></span> ready
  </div>
</header>

<div class="workspace">

  <div class="editor-pane">
    <div class="pane-header">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
      &nbsp; Enter Your Code
    </div>
    <div class="editor-body">
      <div class="line-numbers" id="line-nums">1</div>
      <textarea id="code-input" oninput="updateLines()"
        onkeydown="handleTab(event)"></textarea>
    </div>
  </div>

  <div class="output-pane">
    <div class="output-header">
      <div class="output-title">
        ⚙ Compilation Output
        <span id="status-badge"></span>
      </div>
      <button class="btn-run" id="run-btn" onclick="compile()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-label">▶ Run &amp; Compile</span>
      </button>
    </div>

    <div class="output-body">
      <div class="idle-state" id="idle">
        <div class="icon">⚙</div>
        <div>Press <strong style="color:var(--text)">Run &amp; Compile</strong> to execute</div>
        <div style="color:var(--text-dim);font-size:11px;margin-top:4px;">or Ctrl + Enter</div>
      </div>
      <div id="output-result"></div>
    </div>
  </div>

</div>

<div class="statusbar">
  <span id="sb-lines">Ln 1</span>
  <span id="sb-chars">0 chars</span>
  <span id="sb-msg"></span>
</div>

<script>
const SERVER = "http://localhost:5000/run";

async function compile() {
  const src = document.getElementById('code-input').value;
  const idle = document.getElementById('idle');
  const result = document.getElementById('output-result');

  // Loading state
  document.getElementById('run-btn').disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('btn-label').textContent = 'Running…';

  idle.style.display = 'none';
  result.innerHTML = '';

  if (!src.trim()) {
    idle.style.display = 'flex';
    resetBtn();
    return;
  }

  try {
    const res = await fetch(SERVER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: src })
    });
    const data = await res.json();

    const badge = document.getElementById('status-badge');
    const sbMsg = document.getElementById('sb-msg');

    if (data.success) {
      badge.textContent = '✓ Success';
      badge.className = 'badge-ok';
      sbMsg.textContent = 'Compilation successful';
      sbMsg.className = 'sb-ok';

      // Render all sections in one unified view
      let html = '';

      // ─ TOKENIZATION SECTION ─
      html += `
        <div class="output-section">
          <div class="section-title">🔤 TOKENIZATION</div>
      `;
      
      if (data.tokenization.length === 0) {
        html += '<div class="out-empty">No tokens generated</div>';
      } else {
        data.tokenization.forEach((line, idx) => {
          html += `
            <div class="token-line">
              <div class="token-line-raw">Line ${idx + 1}: ${esc(line.raw)}</div>
              <div class="token-list">
                ${line.tokens.map(token => `<span class="token">${esc(token)}</span>`).join(' ')}
              </div>
            </div>
          `;
        });
      }
      
      html += `
          <div class="section-divider"></div>
        </div>
      `;

      // ─ SYMBOL TABLE SECTION ─
      const symbolKeys = Object.keys(data.symbol_table);
      html += `
        <div class="output-section">
          <div class="section-title">📝 SYMBOL TABLE</div>
      `;
      
      if (symbolKeys.length === 0) {
        html += '<div class="symbol-empty">No symbols</div>';
      } else {
        html += `
          <table class="symbol-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Value</th>
                <th>Occurrences</th>
              </tr>
            </thead>
            <tbody>
        `;
        
        symbolKeys.forEach(name => {
          const symbol = data.symbol_table[name];
          let valueStr = '';
          if (symbol.type === 'array') {
            valueStr = `[${symbol.value.join(', ')}]`;
          } else {
            valueStr = String(symbol.value);
          }
          
          const displayName = name.includes(':') ? name.split(':')[1] : name;
          const displayType = name.split(':')[0];
          const occurrences = symbol.occurrences || '-';
          
          html += `
            <tr>
              <td class="sym-name">${esc(displayName)}</td>
              <td class="sym-type">${esc(displayType)}</td>
              <td class="sym-value">${esc(valueStr)}</td>
              <td class="sym-occur">${esc(String(occurrences))}</td>
            </tr>
          `;
        });
        
        html += `
            </tbody>
          </table>
        `;
      }
      
      html += `
          <div class="section-divider"></div>
        </div>
      `;

      // ─ PROGRAM OUTPUT SECTION ─
      html += `
        <div class="output-section">
          <div class="section-title">📤 PROGRAM OUTPUT</div>
      `;
      
      if (data.output.length === 0) {
        html += '<div class="out-empty">Program ran with no output</div>';
      } else {
        data.output.forEach(line => {
          if (line.startsWith('[Error]')) {
            html += `<div class="out-error">${esc(line)}</div>`;
          } else {
            html += `<div class="out-line">${esc(line)}</div>`;
          }
        });
      }
      
      html += `</div>`;

      result.innerHTML = html;

    } else {
      result.innerHTML = `<div class="out-error">✕ ${esc(data.error)}</div>`;
      badge.textContent = '✕ Error';
      badge.className = 'badge-err';
      sbMsg.textContent = data.error;
      sbMsg.className = 'sb-err';
    }
    badge.style.display = 'inline';

  } catch (e) {
    result.innerHTML = `<div class="out-error">
      ✕ Cannot reach server.<br><br>
      Make sure <strong>server.py</strong> is running:<br>
      <span style="color:var(--accent)">python server.py</span>
    </div>`;
    document.getElementById('status-badge').textContent = '✕ No Server';
    document.getElementById('status-badge').className = 'badge-err';
    document.getElementById('status-badge').style.display = 'inline';
    document.getElementById('sb-msg').textContent = 'Server not running';
    document.getElementById('sb-msg').className = 'sb-err';
  }

  resetBtn();
}

function resetBtn() {
  document.getElementById('run-btn').disabled = false;
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btn-label').textContent = '▶ Run & Compile';
}

const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function updateLines() {
  const ta = document.getElementById('code-input');
  const count = ta.value.split('\n').length;
  document.getElementById('line-nums').innerHTML =
    Array.from({length: count}, (_, i) => i + 1).join('<br>');
  document.getElementById('sb-lines').textContent = `Ln ${count}`;
  document.getElementById('sb-chars').textContent = `${ta.value.length} chars`;
}

function handleTab(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target, s = ta.selectionStart;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
    updateLines();
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') compile();
});

updateLines();
</script>
</body>
</html>
